# Supabase config for the migracionplus app.
# Reference: https://supabase.com/docs/guides/cli/config
#
# IMPORTANT: this project shares its Supabase instance with other apps. Do not
# enable destructive default behavior here that could affect sibling schemas.

project_id = "dixiictpofceqbfodfto"

[api]
enabled = true
port = 54321
# Schemas exposed via the auto-generated REST API. `migracionplus` is added so
# the supabase-js client (configured with `db: { schema: 'migracionplus' }`)
# can read/write our tables. `public` and `graphql_public` are kept because
# other apps in this project may rely on them.
schemas = ["public", "graphql_public", "migracionplus"]
extra_search_path = ["public", "extensions", "migracionplus"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[analytics]
enabled = false
